<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elérhető Apartmanjaink</title>
<style>

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body { 
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
    min-height: 100vh; 
  }  

  /* FIX HÁTTÉR RÉTEG - Megoldja a mozgási és blur problémát */
  .fixed-background {
    position: fixed;
    inset: 0;
    background-image: url('naplemente.jpg'); /* Ellenőrizd a saját fájlnevedet! */
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    z-index: -2;
  }

  /* Lágy sötétítő és kontrasztnövelő réteg a háttér felett */
  .fixed-background::before { 
    content: ''; 
    position: absolute; 
    inset: 0; 
    background: linear-gradient(to bottom, rgba(0, 0, 0, 0.05), rgba(0, 0, 0, 0.25));
    z-index: -1; 
  }

  header {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 40px 24px 20px;
  }

  header h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #ffffff; /* Fehérre cserélve a jobb olvashatóságért a sötét égbolton */
    text-shadow: 0 2px 10px rgba(0,0,0,0.3);
    margin-bottom: 6px;
  }

  header p {
    font-size: 14px;
    color: rgba(255, 255, 255, 0.8); /* Világosítva a háttér miatt */
    text-shadow: 0 1px 5px rgba(0,0,0,0.3);
    letter-spacing: 0.5px;
  }

  .grid {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 18px;
    padding: 20px 20px 40px;
    max-width: 1100px;
    margin: 0 auto;
  }

  @media (max-width: 640px) {
    .grid { grid-template-columns: 1fr; padding: 12px 12px 40px; gap: 14px; }
    header h1 { font-size: 22px; }
  }

  /* IGAZI LIQUID GLASS CARD */
  .card {
    /* Visszafogottabb fehér alap, hogy a naplemente átüssön rajta */
    background: rgba(255, 255, 255, 0.15);
    
    /* Erőteljes elmosás az igazi üvegérzethez */
    backdrop-filter: blur(18px) saturate(160%);
    -webkit-backdrop-filter: blur(18px) saturate(160%);
    
    border-radius: 22px;
    
    /* Vékony, csillogó üvegszegély */
    border: 1px solid rgba(255, 255, 255, 0.25);
    
    /* Mélyebb árnyékok a lebegő hatásért és belső ragyogás */
    box-shadow:
      0 10px 30px rgba(0,0,0,0.15),
      0 1px 2px rgba(255,255,255,0.4) inset,
      0 -1px 2px rgba(0,0,0,0.1) inset;
      
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.25s ease;
  }

  .card:hover {
    transform: translateY(-6px) scale(1.01);
    background: rgba(255, 255, 255, 0.22); /* Kicsit kivilágosodik hoverre */
    box-shadow:
      0 20px 40px rgba(0,0,0,0.25),
      0 1px 3px rgba(255,255,255,0.6) inset;
  }

  .card:active { transform: scale(0.98); }
  .card.foglalt { opacity: 0.35; cursor: default; pointer-events: none; }

  .card-img {
    width: 100%;
    height: 180px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 56px;
    position: relative;
    background: rgba(255, 255, 255, 0.05); /* Halvány alap az emojik mögé */
  }

  .card-img::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, transparent 40%, rgba(255,255,255,0.15) 100%);
  }

  .card-body { padding: 14px 18px 18px; }
  
  /* Sötétített szöveg színek a tökéletes olvashatóságért a világosabb üveglapon */
  .card-title { font-size: 16px; font-weight: 700; color: #0b0f19; margin-bottom: 6px; }
  .card-desc { font-size: 13px; color: rgba(11, 15, 25, 0.7); line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

  .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 14px; }

  .badge {
    font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 20px;
    backdrop-filter: blur(8px);
    letter-spacing: 0.3px;
  }
  .badge-green { background: rgba(187,247,208,0.85); color: #14532d; border: 1px solid rgba(74,222,128,0.4); }
  .badge-red { background: rgba(254,202,202,0.85); color: #7f1d1d; border: 1px solid rgba(248,113,113,0.4); }
  .persons { font-size: 12px; color: rgba(11, 15, 25, 0.6); }

  /* MODAL OVERLAY */
  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(10, 15, 26, 0.4); /* Sötétebb overlay a drámaibb hatásért */
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    z-index: 200; align-items: flex-end; justify-content: center;
  }
  @media (min-width: 640px) { .overlay { align-items: center; padding: 20px; } }
  .overlay.open { display: flex; }

  /* ULTRA GLASS MODAL */
  .modal {
    background: rgba(255, 255, 255, 0.35);
    backdrop-filter: blur(35px) saturate(180%);
    -webkit-backdrop-filter: blur(35px) saturate(180%);
    border: 1px solid rgba(255, 255, 255, 0.4);
    box-shadow: 0 32px 80px rgba(0,0,0,0.3), 0 1px 0 rgba(255,255,255,0.5) inset;
    border-radius: 28px 28px 0 0;
    width: 100%; max-height: 92vh; overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  @media (min-width: 640px) { .modal { border-radius: 24px; max-width: 540px; max-height: 88vh; } }

  .modal-drag { width: 36px; height: 4px; background: rgba(0,0,0,0.2); border-radius: 2px; margin: 14px auto 0; }
  @media (min-width: 640px) { .modal-drag { display: none; } }

  .modal-img { width: 100%; height: 200px; display: flex; align-items: center; justify-content: center; font-size: 72px; margin-top: 8px; border-radius: 16px; margin: 10px 16px; width: calc(100% - 32px); background: rgba(255,255,255,0.1); }
  .modal-body { padding: 16px 22px 32px; }
  .modal-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
  .modal-title { font-size: 20px; font-weight: 700; color: #0f172a; line-height: 1.3; }

  .close-btn {
    background: rgba(0,0,0,0.1);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 50%; width: 32px; height: 32px;
    font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; color: #0f172a; margin-top: 2px;
  }

  .modal-desc { font-size: 14px; color: rgba(15,23,42,0.75); line-height: 1.7; margin-bottom: 18px; }

  .details-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; }
  
  .detail-item {
    background: rgba(255, 255, 255, 0.25);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.3);
    border-radius: 14px; padding: 12px 14px;
  }
  .detail-label { font-size: 10px; color: rgba(15,23,42,0.5); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 4px; }
  .detail-val { font-size: 14px; font-weight: 700; color: #0f172a; }

  .detail-btn {
    display: block; width: 100%; padding: 15px;
    background: rgba(15, 23, 42, 0.9);
    backdrop-filter: blur(8px);
    color: #fff; border: none; border-radius: 16px;
    font-size: 15px; font-weight: 700; cursor: pointer;
    text-align: center; text-decoration: none;
    box-shadow: 0 4px 16px rgba(15,23,42,0.25);
    transition: background 0.15s;
  }
  .detail-btn:hover { background: #0f172a; }

</style>
</head>
<body>

<!-- ÚJ FIX HÁTTÉR ELEM -->
<div class="fixed-background"></div>

<header>
  <h1>Elérhető Apartmanjaink</h1>
  
</header>

<div class="grid" id="grid"></div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-drag"></div>
    <div class="modal-img" id="modal-img"></div>
    <div class="modal-body">
      <div class="modal-header">
        <span class="modal-title" id="modal-title"></span>
        <button class="close-btn" onclick="closeModal()">✕</button>
      </div>
      <p class="modal-desc" id="modal-desc"></p>
      <div class="details-grid">
        <div class="detail-item"><div class="detail-label">Személyek</div><div class="detail-val" id="m-persons"></div></div>
        <div class="detail-item"><div class="detail-label">Méret</div><div class="detail-val" id="m-size"></div></div>
        <div class="detail-item"><div class="detail-label">Ár / éjszaka</div><div class="detail-val" id="m-price"></div></div>
        <div class="detail-item"><div class="detail-label">Típus</div><div class="detail-val" id="m-type"></div></div>
      </div>
      <a class="detail-btn" id="modal-detail" href="#">Részletes oldal megtekintése →</a>
    </div>
  </div>
</div>

<script>
  


const REPO = "galaczi-hub/apartmanok";
const STATUS_URL = `https://raw.githubusercontent.com/${REPO}/main/status.json?t=${Date.now()}`;

const apts = [
  { id: "apt1", name: "Vanili Santa Pola", emoji: "⚓", color: "rgba(219, 234, 254, 0.6)",
    desc: "Ahol a reggelek a tengeri levegő frissességével kezdődnek, a napokat pedig a kikötő és a közeli strandok teszik különlegessé.", long: "Az apartman Santa Pola egyik legkedveltebb részén, a vitorláskikötő közvetlen közelében található, mindössze néhány perc sétára a tengerparttól. A modern, igényesen berendezett lakás minden részlete azt a célt szolgálja, hogy vendégeink valóban otthon érezzék magukat.",
    persons: "2–3 fő", size: "36 m²", price: "75 €/éjtől", type: "1 hálószoba",
    page: "apt-1.html" },
  { id: "apt2", name: "Casa del Sol", emoji: "🌊", color: "rgba(186, 230, 253, 0.6)",
    desc: "A Casa del Solban minden nap egy tengerre néző mosollyal kezdődik.", long: "A Casa del Sol Santa Pola a tengerparttól legfeljebb 2 perc sétára helyezkedik el. A lakásból tengerre néző kilátás nyílik – reggelente a napfelkeltét a saját teraszodról nézheted, este pedig a hullámok morajlása ringat el.",
    persons: "4–5 fő", size: "60 m²", price: "85 €/éjtől", type: "2 hálószoba",
    page: "apt-2.html" },
  { id: "apt3", name: "Avenida Argentina", emoji: "🌅", color: "rgba(254, 243, 199, 0.6)",
    desc: "Ahol a modern kényelem és a tenger látványa minden nap különleges élménnyé válik.", long: "Az Avenida Argentina apartman Santa Pola keleti városrészében, a tengerparthoz és a parti sétányhoz közel található. Élvezd a nyugodt környezetet anélkül, hogy lemondanál a kényelemről és a tenger látványáról!",
    persons: "4–5 fő", size: "70 m²", price: "85 €/éjtől", type: "2 hálószoba, 2 fürdőszoba",
    page: "apt-3.html" },
  { id: "apt4", name: "Mecset apartman", emoji: "🕌", color: "rgba(253, 230, 138, 0.6)",
    desc: "Keleties hangulat, mediterrán nyugalom és a Playa Varadero közelsége.", long: "A Mecset apartman Santa Pola de Este városrészében található. A szállás ötvözi a mór stílust és a keleti kényelmet a mediterrán nyugalommal. Santa Pola legszebb strandjától csak 50 méterre, közösségi medencével és autóbeállóval.",
    persons: "4–5 fő", size: "70 m²", price: "85 €/éjtől", type: "2 hálószoba",
    page: "apt-4.html" },
  { id: "apt5", name: "Green Terrace Home", emoji: "🌿", color: "rgba(187, 247, 208, 0.6)",
    desc: "A nyugalom zöld oázisa Gran Alacant szívében.", long: "A Green Terrace Home apartman Santa Pola Gran Alacant városrészében található. Ha olyan szállást keresel, ahol a kényelmes pihenés és a mediterrán életérzés tökéletes harmóniában találkozik, ez az ideális választás.",
    persons: "4 fő", size: "75 m² + 55 m² terasz", price: "100 €/éjtől", type: "2 hálószoba, 2 fürdőszoba",
    page: "apt-5.html" },
  { id: "apt6", name: "Vanili Serra Grossa", emoji: "🏙️", color: "rgba(221, 214, 254, 0.6)",
    desc: "Ahol Alicante pezsgő városi élete találkozik a mediterrán nyugalommal.", long: "Van hely, ahol az ember turista marad... és van hely, ahol néhány napra úgy érzi, mintha ide tartozna. A Vanili Serra Grossa apartman pontosan ezt az élményt kínálja Alicante egyik legkedveltebb részén.",
    persons: "4–5 fő", size: "80 m²", price: "120 €/éjtől", type: "2 hálószoba",
    page: "apt-6.html" },
  { id: "apt7", name: "Alicante Big Holiday", emoji: "🏔️", color: "rgba(254, 202, 202, 0.6)",
    desc: "Ahol a luxus, a tér és a panoráma találkozik — Alicante szívében.", long: "Lépj be az Alicante Big Holiday apartmanba, ahol a modern elegancia és az otthon melege tökéletes összhangot alkot. A teljeskörűen felújított apartman prémium minőségű berendezésével a luxus érzetét nyújtja minden vendég számára.",
    persons: "7 fő", size: "100 m²", price: "120 €/éjtől", type: "3 hálószoba",
    page: "apt-7.html" },

];

let status = {};

async function loadStatus() {
  try {
    const res = await fetch(STATUS_URL);
    status = await res.json();
  } catch(e) {
    apts.forEach(a => status[a.id] = true);
  }
  renderCards();
}

function renderCards() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  apts.forEach((a, i) => {
    const free = status[a.id] !== false;
    const card = document.createElement('div');
    card.className = 'card' + (free ? '' : ' foglalt');
    if (free) card.onclick = () => openModal(i);
    card.innerHTML = `
      <div class="card-img" style="background:${a.color}">${a.emoji}</div>
      <div class="card-body">
        <div class="card-title">${a.name}</div>
        <div class="card-desc">${a.desc}</div>
        <div class="card-footer">
          <span class="badge ${free ? 'badge-green' : 'badge-red'}">${free ? 'Elérhető' : 'Foglalt'}</span>
          <span class="persons">👥 ${a.persons}</span>
        </div>
      </div>`;
    grid.appendChild(card);
  });
}

function openModal(i) {
  const a = apts[i];
  const img = document.getElementById('modal-img');
  img.textContent = a.emoji;
  img.style.background = a.color;
  document.getElementById('modal-title').textContent = a.name;
  document.getElementById('modal-desc').textContent = a.long;
  document.getElementById('m-persons').textContent = a.persons;
  document.getElementById('m-size').textContent = a.size;
  document.getElementById('m-price').textContent = a.price;
  document.getElementById('m-type').textContent = a.type;
  document.getElementById('modal-detail').href = a.page;
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay')) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

loadStatus();
</script>
</body>
</html>
