<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apartmanjaink</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f7f6f3; color: #1a1a1a; min-height: 100vh; }

  header { background: #fff; border-bottom: 1px solid #e8e6e0; padding: 20px 24px; text-align: center; }
  header h1 { font-size: 22px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; }
  header p { font-size: 13px; color: #888; margin-top: 5px; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; padding: 20px 16px; max-width: 1100px; margin: 0 auto; }
  @media (max-width: 640px) { .grid { grid-template-columns: 1fr; padding: 12px; gap: 12px; } }

  .card { background: #fff; border-radius: 14px; border: 1px solid #ece9e2; overflow: hidden; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s, opacity 0.2s; }
  .card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
  .card:active { transform: scale(0.98); }
  .card.foglalt { opacity: 0.45; cursor: default; pointer-events: none; }

  .card-img { width: 100%; height: 190px; display: flex; align-items: center; justify-content: center; font-size: 52px; }
  .card-body { padding: 14px 16px 16px; }
  .card-title { font-size: 15px; font-weight: 600; color: #1a1a1a; margin-bottom: 5px; }
  .card-desc { font-size: 13px; color: #666; line-height: 1.55; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; }

  .badge { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; }
  .badge-green { background: #e2f5ec; color: #1a7a45; }
  .badge-red { background: #fde8e8; color: #a01a1a; }
  .persons { font-size: 12px; color: #888; }

  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: flex-end; justify-content: center; }
  @media (min-width: 640px) { .overlay { align-items: center; padding: 16px; } }
  .overlay.open { display: flex; }

  .modal { background: #fff; border-radius: 20px 20px 0 0; width: 100%; max-height: 92vh; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  @media (min-width: 640px) { .modal { border-radius: 16px; max-width: 520px; max-height: 90vh; } }

  .modal-drag { width: 40px; height: 4px; background: #ddd; border-radius: 2px; margin: 12px auto 0; }
  @media (min-width: 640px) { .modal-drag { display: none; } }

  .modal-img { width: 100%; height: 220px; display: flex; align-items: center; justify-content: center; font-size: 72px; margin-top: 8px; }
  .modal-body { padding: 16px 20px 32px; }
  .modal-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 10px; }
  .modal-title { font-size: 19px; font-weight: 600; line-height: 1.3; }
  .close-btn { background: #f2f1ee; border: none; border-radius: 50%; width: 30px; height: 30px; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: #555; }
  .modal-desc { font-size: 14px; color: #555; line-height: 1.7; margin-bottom: 18px; }

  .details-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; }
  .detail-item { background: #f7f6f3; border-radius: 10px; padding: 11px 13px; }
  .detail-label { font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; }
  .detail-val { font-size: 14px; font-weight: 600; }

  .btn-row { display: flex; gap: 10px; flex-direction: column; }
  .book-btn { display: block; width: 100%; padding: 14px; background: #1a1a1a; color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; text-align: center; text-decoration: none; transition: background 0.15s; }
  .book-btn:hover { background: #333; }
  .link-btn { display: block; width: 100%; padding: 12px; background: transparent; color: #1a1a1a; border: 1px solid #ddd; border-radius: 12px; font-size: 14px; font-weight: 500; cursor: pointer; text-align: center; text-decoration: none; transition: background 0.15s; }
  .link-btn:hover { background: #f7f6f3; }
</style>
</head>
<body>

<header>
  <h1>Vanili Apartments</h1>
  <p>Elérhető apartmanjaink</p>
</header>

<div class="grid" id="grid"></div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-drag"></div>
    <div class="modal-img" id="modal-img"></div>
    <div class="modal-body">
      <div class="modal-header">
        <span class="modal-title" id="modal-title"></span>
        <button class="close-btn" onclick="closeModal()">✕</button>
      </div>
      <p class="modal-desc" id="modal-desc"></p>
      <div class="details-grid">
        <div class="detail-item"><div class="detail-label">Személyek</div><div class="detail-val" id="m-persons"></div></div>
        <div class="detail-item"><div class="detail-label">Méret</div><div class="detail-val" id="m-size"></div></div>
        <div class="detail-item"><div class="detail-label">Ár / éjszaka</div><div class="detail-val" id="m-price"></div></div>
        <div class="detail-item"><div class="detail-label">Típus</div><div class="detail-val" id="m-type"></div></div>
      </div>
      <div class="btn-row">
        <a class="book-btn" id="modal-book" href="#" target="_blank">Foglalás →</a>
        <a class="link-btn" id="modal-detail" href="#">Részletes oldal megtekintése</a>
      </div>
    </div>
  </div>
</div>

<script>
const REPO = "galaczi-hub/apartmanok";
const STATUS_URL = `https://raw.githubusercontent.com/${REPO}/main/status.json?t=${Date.now()}`;

const apts = [
  { id: "apt1", name: "Vanili Santa Pola apartman", emoji: "⚓", color: "#DFF0FB",
    desc: "Ahol a reggelek a tengeri levegő frissességével kezdődnek, a napokat pedig a kikötő és a közeli strandok teszik különlegessé.", long: "Az apartman Santa Pola egyik legkedveltebb részén, a vitorláskikötő közvetlen közelében található, mindössze néhány perc sétára a tengerparttól. A modern, igényesen berendezett lakás minden részlete azt a célt szolgálja, hogy vendégeink valóban otthon érezzék magukat.",
    persons: "2–3 fő", size: "36 m²", price: "75 €/éjtől", type: "1 hálószoba",
    link: "#", page: "apt-1.html" },
  { id: "apt2", name: "Casa del Sol Santa Pola apartman", emoji: "🌊", color: "#E8F5FF",
    desc: "A Casa del Solban minden nap egy tengerre néző mosollyal kezdődik.", long: "A Casa del Sol Santa Pola a tengerparttól legfeljebb 2 perc sétára helyezkedik el. A lakásból tengerre néző kilátás nyílik – reggelente a napfelkeltét a saját teraszodról nézheted, este pedig a hullámok morajlása ringat el.",
    persons: "4–5 fő", size: "60 m²", price: "85 €/éjtől", type: "2 hálószoba",
    link: "#", page: "apt-2.html" },
  { id: "apt3", name: "Avenida Argentina apartman", emoji: "🌅", color: "#FFF3DC",
    desc: "Ahol a modern kényelem és a tenger látványa minden nap különleges élménnyé válik.", long: "Az Avenida Argentina apartman Santa Pola keleti városrészében, a tengerparthoz és a parti sétányhoz közel található. Élvezd a nyugodt környezetet anélkül, hogy lemondanál a kényelemről és a tenger látványáról!",
    persons: "4–5 fő", size: "70 m²", price: "85 €/éjtől", type: "2 hálószoba, 2 fürdőszoba",
    link: "#", page: "apt-3.html" },
  { id: "apt4", name: "Mecset apartman", emoji: "🕌", color: "#F5EDD8",
    desc: "Keleties hangulat, mediterrán nyugalom és a Playa Varadero közelsége.", long: "A Mecset apartman Santa Pola de Este városrészében található. A szállás ötvözi a mór stílust és a keleti kényelmet a mediterrán nyugalommal. Santa Pola legszebb strandjától csak 50 méterre, teljesen felszerelt, közösségi medencével és autóbeállóval.",
    persons: "4–5 fő", size: "70 m²", price: "85 €/éjtől", type: "2 hálószoba",
    link: "#", page: "apt-4.html" },
  { id: "apt5", name: "Green Terrace Home", emoji: "🌿", color: "#E8F5E2",
    desc: "A nyugalom zöld oázisa Gran Alacant szívében.", long: "A Green Terrace Home apartman Santa Pola Gran Alacant városrészében található. Ha olyan szállást keresel, ahol a kényelmes pihenés és a mediterrán életérzés tökéletes harmóniában találkozik, ez az ideális választás.",
    persons: "4 fő", size: "75 m² + 55 m² terasz", price: "100 €/éjtől", type: "2 hálószoba, 2 fürdőszoba",
    link: "#", page: "apt-5.html" },
  { id: "apt6", name: "Vanili Serra Grossa – Alicante", emoji: "🏙️", color: "#EEEDFE",
    desc: "Ahol Alicante pezsgő városi élete találkozik a mediterrán nyugalommal.", long: "Van hely, ahol az ember turista marad... és van hely, ahol néhány napra úgy érzi, mintha ide tartozna. A Vanili Serra Grossa apartman pontosan ezt az élményt kínálja Alicante egyik legkedveltebb részén.",
    persons: "4–5 fő", size: "80 m²", price: "120 €/éjtől", type: "2 hálószoba",
    link: "#", page: "apt-6.html" },
  { id: "apt7", name: "Alicante Big Holiday", emoji: "🏔️", color: "#FDECEA",
    desc: "Ahol a luxus, a tér és a panoráma találkozik — Alicante szívében.", long: "Lépj be az Alicante Big Holiday apartmanba, ahol a modern elegancia és az otthon melege tökéletes összhangot alkot. A teljeskörűen felújított apartman prémium minőségű berendezésével a luxus érzetét nyújtja minden vendég számára.",
    persons: "7 fő", size: "100 m²", price: "120 €/éjtől", type: "3 hálószoba",
    link: "#", page: "apt-7.html" },
  { id: "apt8", name: "Alicante Big Holiday 2", emoji: "🌃", color: "#E8EEF5",
    desc: "Modern elegancia és otthonos légkör Alicante egyik legjobb negyedében.", long: "Egy kényelmes, tágas és otthonos lakás Alicante szívében, ahonnan gyalogosan elérhető a tengerpart, a város legjobb éttermei, kávézói és számos látnivalója.",
    persons: "4–5 fő", size: "80 m²", price: "110 €/éjtől", type: "2 hálószoba",
    link: "#", page: "apt-8.html" },
];

let status = {};

async function loadStatus() {
  try {
    const res = await fetch(STATUS_URL);
    status = await res.json();
  } catch(e) {
    apts.forEach(a => status[a.id] = true);
  }
  renderCards();
}

function renderCards() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  apts.forEach((a, i) => {
    const free = status[a.id] !== false;
    const card = document.createElement('div');
    card.className = 'card' + (free ? '' : ' foglalt');
    if (free) card.onclick = () => openModal(i);
    card.innerHTML = `
      <div class="card-img" style="background:${a.color}">${a.emoji}</div>
      <div class="card-body">
        <div class="card-title">${a.name}</div>
        <div class="card-desc">${a.desc}</div>
        <div class="card-footer">
          <span class="badge ${free ? 'badge-green' : 'badge-red'}">${free ? 'Elérhető' : 'Foglalt'}</span>
          <span class="persons">👥 ${a.persons}</span>
        </div>
      </div>`;
    grid.appendChild(card);
  });
}

function openModal(i) {
  const a = apts[i];
  const img = document.getElementById('modal-img');
  img.textContent = a.emoji;
  img.style.background = a.color;
  document.getElementById('modal-title').textContent = a.name;
  document.getElementById('modal-desc').textContent = a.long;
  document.getElementById('m-persons').textContent = a.persons;
  document.getElementById('m-size').textContent = a.size;
  document.getElementById('m-price').textContent = a.price;
  document.getElementById('m-type').textContent = a.type;
  document.getElementById('modal-book').href = a.link;
  document.getElementById('modal-detail').href = a.page;
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay')) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

loadStatus();
</script>
</body>
</html>
