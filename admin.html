<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Vanili Apartments</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f7f6f3; color: #1a1a1a; min-height: 100vh; }

  .login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 16px; }
  .login-box { background: #fff; border-radius: 16px; border: 1px solid #ece9e2; padding: 32px 28px; width: 100%; max-width: 360px; text-align: center; }
  .login-box h1 { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
  .login-box p { font-size: 13px; color: #888; margin-bottom: 24px; }
  .login-box input { width: 100%; padding: 12px 14px; border: 1px solid #ddd; border-radius: 10px; font-size: 15px; outline: none; margin-bottom: 12px; }
  .login-box input:focus { border-color: #1a1a1a; }
  .login-btn { width: 100%; padding: 13px; background: #1a1a1a; color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; }
  .login-btn:hover { background: #333; }
  .error { color: #c0392b; font-size: 13px; margin-top: 8px; display: none; }

  .admin-screen { display: none; max-width: 520px; margin: 0 auto; padding: 20px 16px 40px; }
  header { text-align: center; margin-bottom: 24px; padding-top: 20px; }
  header h1 { font-size: 20px; font-weight: 600; letter-spacing: 1px; }
  header p { font-size: 13px; color: #888; margin-top: 4px; }

  .apt-list { display: flex; flex-direction: column; gap: 10px; }
  .apt-row { background: #fff; border-radius: 14px; border: 1px solid #ece9e2; padding: 16px 18px; display: flex; align-items: center; justify-content: space-between; gap: 12px; transition: opacity 0.2s; }
  .apt-info { display: flex; align-items: center; gap: 12px; }
  .apt-emoji { font-size: 28px; }
  .apt-name { font-size: 15px; font-weight: 500; }
  .apt-status { font-size: 12px; color: #888; margin-top: 2px; }

  /* Toggle switch */
  .toggle { position: relative; width: 52px; height: 30px; flex-shrink: 0; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .slider { position: absolute; inset: 0; background: #ddd; border-radius: 30px; cursor: pointer; transition: background 0.2s; }
  .slider:before { content: ''; position: absolute; width: 22px; height: 22px; left: 4px; top: 4px; background: #fff; border-radius: 50%; transition: transform 0.2s; box-shadow: 0 1px 4px rgba(0,0,0,0.2); }
  input:checked + .slider { background: #2ecc71; }
  input:checked + .slider:before { transform: translateX(22px); }

  .save-btn { width: 100%; margin-top: 20px; padding: 15px; background: #1a1a1a; color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.15s; }
  .save-btn:hover { background: #333; }
  .save-btn:disabled { background: #999; cursor: not-allowed; }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1a1a1a; color: #fff; padding: 12px 24px; border-radius: 30px; font-size: 14px; font-weight: 500; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h1>🏡 Admin belépés</h1>
    <p>Vanili Apartments kezelőfelület</p>
    <input type="password" id="pwInput" placeholder="Jelszó" onkeydown="if(event.key==='Enter')login()">
    <button class="login-btn" onclick="login()">Belépés</button>
    <div class="error" id="loginError">Hibás jelszó</div>
  </div>
</div>

<div class="admin-screen" id="adminScreen">
  <header>
    <h1>Vanili Apartments</h1>
    <p>Apartman elérhetőség kezelése</p>
  </header>

  <div class="apt-list" id="aptList"></div>
  <button class="save-btn" id="saveBtn" onclick="saveStatus()">💾 Mentés és közzététel</button>
</div>

<div class="toast" id="toast"></div>

<script>
const PASSWORD = "Holapola";
const GITHUB_TOKEN = "GITHUB_TOKEN_IDE"; // ← ide illeszd be a GitHub tokened
const REPO = "galaczi-hub/apartmanok";
const FILE_PATH = "status.json";
const BRANCH = "main";

const apts = [
  { id: "apt1", name: "Napsugár apartman", emoji: "☀️" },
  { id: "apt2", name: "Bükk villa apartman", emoji: "🌲" },
  { id: "apt3", name: "Kőház apartman", emoji: "🪨" },
  { id: "apt4", name: "Panoráma penthouse", emoji: "🌅" },
  { id: "apt5", name: "Levendula apartman", emoji: "💜" },
  { id: "apt6", name: "Tóparti apartman", emoji: "🏊" },
  { id: "apt7", name: "Szőlőhegyi apartman", emoji: "🍇" },
  { id: "apt8", name: "Hegyi menedék", emoji: "⛰️" },
];

let currentStatus = {};
let fileSha = '';

function login() {
  const pw = document.getElementById('pwInput').value;
  if (pw === PASSWORD) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminScreen').style.display = 'block';
    loadStatus();
  } else {
    document.getElementById('loginError').style.display = 'block';
  }
}

async function loadStatus() {
  try {
    const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE_PATH}`, {
      headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Accept': 'application/vnd.github.v3+json' }
    });
    const data = await res.json();
    fileSha = data.sha;
    currentStatus = JSON.parse(atob(data.content));
  } catch(e) {
    apts.forEach(a => currentStatus[a.id] = true);
  }
  renderToggles();
}

function renderToggles() {
  const list = document.getElementById('aptList');
  list.innerHTML = '';
  apts.forEach(a => {
    const free = currentStatus[a.id] !== false;
    const row = document.createElement('div');
    row.className = 'apt-row';
    row.innerHTML = `
      <div class="apt-info">
        <span class="apt-emoji">${a.emoji}</span>
        <div>
          <div class="apt-name">${a.name}</div>
          <div class="apt-status" id="status-${a.id}">${free ? '✅ Elérhető' : '🔴 Foglalt'}</div>
        </div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="toggle-${a.id}" ${free ? 'checked' : ''} onchange="updateStatus('${a.id}', this.checked)">
        <span class="slider"></span>
      </label>`;
    list.appendChild(row);
  });
}

function updateStatus(id, val) {
  currentStatus[id] = val;
  document.getElementById(`status-${id}`).textContent = val ? '✅ Elérhető' : '🔴 Foglalt';
}

async function saveStatus() {
  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.textContent = 'Mentés folyamatban...';

  const content = btoa(JSON.stringify(currentStatus, null, 2));
  try {
    const body = { message: 'Státusz frissítve', content, branch: BRANCH };
    if (fileSha) body.sha = fileSha;

    const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE_PATH}`, {
      method: 'PUT',
      headers: {
        'Authorization': `token ${GITHUB_TOKEN}`,
        'Accept': 'application/vnd.github.v3+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    });

    if (res.ok) {
      const data = await res.json();
      fileSha = data.content.sha;
      showToast('✅ Sikeresen mentve!');
    } else {
      showToast('❌ Hiba történt, próbáld újra');
    }
  } catch(e) {
    showToast('❌ Kapcsolati hiba');
  }

  btn.disabled = false;
  btn.textContent = '💾 Mentés és közzététel';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
